name: Trivy Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions: read-all

jobs:
  scan-backend:
    name: Scan Backend Image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Build Backend image"
        run: docker build -t backend:${{ github.sha }} ./backend

      - name: "Run Trivy vulnerability scanner"
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "backend:${{ github.sha }}"
          format: "sarif"
          output: "trivy-backend.sarif"
          severity: "CRITICAL,HIGH"

      - name: "Upload Trivy scan results"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-backend.sarif"
          category: "trivy-backend"

  scan-frontend:
    name: Scan Frontend Image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Build Frontend image"
        run: docker build -t frontend:${{ github.sha }} ./frontend

      - name: "Run Trivy vulnerability scanner"
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "frontend:${{ github.sha }}"
          format: "sarif"
          output: "trivy-frontend.sarif"
          severity: "CRITICAL,HIGH"

      - name: "Upload Trivy scan results"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-frontend.sarif"
          category: "trivy-frontend"

  scan-repo:
    name: Scan Repository (IaC & Filesystem)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Run Trivy filesystem scanner"
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-repo.sarif"
          severity: "CRITICAL,HIGH"

      - name: "Upload Trivy scan results"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-repo.sarif"
          category: "trivy-repo"
