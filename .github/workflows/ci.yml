name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
    tags: ["*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions: read-all

env:
  REGISTRY: ghcr.io

jobs:
  # ──────────────────────────────────────────────
  # Phase 1 — Install & Lint (parallel)
  # ──────────────────────────────────────────────
  backend-lint:
    name: "Backend - Install & Lint"
    runs-on: ubuntu-24.04
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Copy .env.example to .env"
        run: cp .env.example .env

      - name: "Start services"
        run: docker compose up backend timescaledb -d

      - name: "Install dependencies"
        run: docker compose exec backend uv sync --extra dev

      - name: "Ruff check"
        run: docker compose exec backend uv run ruff check --exclude .venv .

      - name: "Ruff format check"
        run: docker compose exec backend uv run ruff format --check --exclude .venv .

  frontend-lint:
    name: "Frontend - Install & Lint"
    runs-on: ubuntu-24.04
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Copy .env.example to .env"
        run: cp .env.example .env

      - name: "Start services"
        run: docker compose up frontend -d

      - name: "Install dependencies"
        run: docker compose exec -e NODE_ENV=development frontend npm ci

      - name: "Lint"
        run: docker compose exec frontend npm run check

  # ──────────────────────────────────────────────
  # Phase 2 — Tests (needs lint)
  # ──────────────────────────────────────────────
  backend-test:
    name: "Backend - Tests"
    needs: [backend-lint]
    runs-on: ubuntu-24.04
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Copy .env.example to .env"
        run: cp .env.example .env

      - name: "Start services"
        run: docker compose up backend timescaledb -d

      - name: "Install dependencies"
        run: docker compose exec backend uv sync --extra dev

      - name: "Run migrations"
        run: docker compose exec backend uv run python manage.py migrate

      - name: "Run tests"
        run: docker compose exec backend uv run pytest

  # ──────────────────────────────────────────────
  # Phase 3 — Security scans (needs tests)
  # ──────────────────────────────────────────────
  backend-security:
    name: "Backend - Security"
    needs: [backend-test]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Run Trivy vulnerability scanner"
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "./backend"
          format: "sarif"
          output: "trivy-backend.sarif"
          severity: "CRITICAL,HIGH"

      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-backend.sarif"
          category: "trivy-ci-backend"

  frontend-security:
    name: "Frontend - Security"
    needs: [frontend-lint]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Run Trivy vulnerability scanner"
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "./frontend"
          format: "sarif"
          output: "trivy-frontend.sarif"
          severity: "CRITICAL,HIGH"

      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-frontend.sarif"
          category: "trivy-ci-frontend"

  # ──────────────────────────────────────────────
  # Phase 4 — Build & Push (needs security, only on tags)
  # ──────────────────────────────────────────────
  build-and-push:
    name: "Build and Push Images"
    needs: [backend-security, frontend-security]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Lowercase repo name"
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: "Log in to the container registry"
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Build and push Backend"
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest

      - name: "Build and push Frontend"
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
