global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "django-backend"
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 30s
    static_configs:
      - targets: ["backend:8000"]
